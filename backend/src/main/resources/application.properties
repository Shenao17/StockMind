# =============================================================================
# StockMind Backend — Configuración de Spring Boot
# =============================================================================

# Servidor
server.port=8080

# =============================================================================
# Base de datos MySQL
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/stockmind_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================================================
# JWT
# =============================================================================
# IMPORTANTE: Usar el mismo secreto configurado en el gateway Node.js
jwt.secret=stockmind_super_secret_key_2024_change_in_production
jwt.expiration=86400000
# 86400000 ms = 24 horas

# =============================================================================
# Logging
# =============================================================================
logging.level.com.stockmind=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =============================================================================
# CORS (el gateway Node.js es el único origen permitido en producción)
# =============================================================================
cors.allowed-origins=http://localhost:3000,http://localhost:5500
