<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockMind — Usuarios</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>StockMind</h1><span>Gestión de Inventario</span></div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">◈</span> Productos</a>
        <a href="inventory.html" class="nav-item"><span class="nav-icon">⊟</span> Inventario</a>
        <a href="sales.html" class="nav-item"><span class="nav-icon">◉</span> Ventas</a>
        <span class="nav-section-label">Analítica</span>
        <a href="predictions.html" class="nav-item"><span class="nav-icon">◈</span> Predicciones</a>
        <a href="reports.html" class="nav-item"><span class="nav-icon">⊡</span> Reportes</a>
        <span class="nav-section-label">Administración</span>
        <a href="users.html" class="nav-item active" id="nav-users"><span class="nav-icon">◎</span> Usuarios</a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">—</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="logout()">⎋</button>
      </div>
    </aside>

    <header class="topbar">
      <span class="topbar-title">Gestión de Usuarios</span>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo usuario</button>
      </div>
    </header>

    <main class="main-content">
      <div class="table-container">
        <div class="table-header"><h2>Usuarios del Sistema</h2></div>
        <div id="users-table">
          <div class="loading-state"><div class="spinner"></div> Cargando...</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <h3 class="modal-title" id="modal-title">Nuevo Usuario</h3>
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label>Nombre de usuario *</label>
        <input type="text" id="u-username" placeholder="sin espacios" />
      </div>
      <div class="form-group">
        <label>Correo electrónico *</label>
        <input type="email" id="u-email" placeholder="usuario@empresa.com" />
      </div>
      <div class="form-group">
        <label>Contraseña <span id="pass-hint" style="color:var(--text-muted);font-size:.75rem">(requerida)</span></label>
        <input type="password" id="u-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="u-role">
          <option value="SELLER">Vendedor</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUser()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    if (!Auth.isAdmin()) { window.location.href = 'dashboard.html'; }
    initUserUI();

    async function loadUsers() {
      try {
        const users = await API.users.list() || [];
        const el = document.getElementById('users-table');
        if (!users.length) {
          el.innerHTML = `<div class="loading-state">Sin usuarios registrados</div>`; return;
        }
        const currentId = Auth.getUser()?.id;
        el.innerHTML = `
          <table>
            <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th><th>Creado</th><th>Acciones</th></tr></thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td><strong>${u.username}</strong> ${u.id == currentId ? '<span class="badge badge-accent" style="font-size:.65rem">Tú</span>' : ''}</td>
                  <td class="mono">${u.email}</td>
                  <td><span class="badge ${u.role === 'ADMIN' ? 'badge-accent' : 'badge-muted'}">${u.role}</span></td>
                  <td><span class="badge ${u.active ? 'badge-success' : 'badge-danger'}">${u.active ? 'Activo' : 'Inactivo'}</span></td>
                  <td class="mono">${new Date(u.createdAt).toLocaleDateString('es-CO')}</td>
                  <td style="display:flex;gap:6px">
                    <button class="btn btn-ghost btn-sm" onclick='openModal(${JSON.stringify(u)})'>Editar</button>
                    ${u.id != currentId ? `<button class="btn btn-danger btn-sm" onclick="toggleUser(${u.id}, ${u.active})">${u.active ? 'Desactivar' : 'Activar'}</button>` : ''}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch(e) {
        showToast('Error cargando usuarios: ' + e.message, 'error');
      }
    }

    function openModal(user = null) {
      if (user) {
        document.getElementById('modal-title').textContent = 'Editar Usuario';
        document.getElementById('edit-id').value    = user.id;
        document.getElementById('u-username').value = user.username;
        document.getElementById('u-email').value    = user.email;
        document.getElementById('u-role').value     = user.role;
        document.getElementById('u-password').value = '';
        document.getElementById('pass-hint').textContent = '(dejar vacío para no cambiar)';
        document.getElementById('u-username').disabled = true;
      } else {
        document.getElementById('modal-title').textContent = 'Nuevo Usuario';
        document.getElementById('edit-id').value = '';
        ['u-username','u-email','u-password'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('u-role').value = 'SELLER';
        document.getElementById('pass-hint').textContent = '(requerida)';
        document.getElementById('u-username').disabled = false;
      }
      document.getElementById('user-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('user-modal').classList.remove('open');
    }

    async function saveUser() {
      const id       = document.getElementById('edit-id').value;
      const email    = document.getElementById('u-email').value.trim();
      const role     = document.getElementById('u-role').value;
      const password = document.getElementById('u-password').value;

      const data = { email, role };
      if (!id) {
        data.username = document.getElementById('u-username').value.trim();
        data.password = password;
        if (!data.username || !data.password) {
          showToast('Usuario y contraseña son obligatorios', 'warning'); return;
        }
      } else if (password) {
        data.password = password;
      }

      try {
        if (id) {
          await API.users.update(id, data);
          showToast('Usuario actualizado');
        } else {
          await API.users.create(data);
          showToast('Usuario creado correctamente');
        }
        closeModal();
        loadUsers();
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    async function toggleUser(id, currentActive) {
      const action = currentActive ? 'desactivar' : 'activar';
      if (!confirm(`¿Confirma ${action} este usuario?`)) return;
      try {
        await API.users.update(id, { active: !currentActive });
        showToast(`Usuario ${currentActive ? 'desactivado' : 'activado'} correctamente`);
        loadUsers();
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    document.getElementById('user-modal').addEventListener('click', e => {
      if (e.target.id === 'user-modal') closeModal();
    });

    loadUsers();
  </script>
</body>
</html>
