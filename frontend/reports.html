<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockMind — Reportes</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>StockMind</h1><span>Gestión de Inventario</span></div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">◈</span> Productos</a>
        <a href="inventory.html" class="nav-item"><span class="nav-icon">⊟</span> Inventario</a>
        <a href="sales.html" class="nav-item"><span class="nav-icon">◉</span> Ventas</a>
        <span class="nav-section-label">Analítica</span>
        <a href="predictions.html" class="nav-item"><span class="nav-icon">◈</span> Predicciones</a>
        <a href="reports.html" class="nav-item active"><span class="nav-icon">⊡</span> Reportes</a>
        <span class="nav-section-label">Administración</span>
        <a href="users.html" class="nav-item" id="nav-users"><span class="nav-icon">◎</span> Usuarios</a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">—</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="logout()">⎋</button>
      </div>
    </aside>

    <header class="topbar">
      <span class="topbar-title">Reportes</span>
    </header>

    <main class="main-content">
      <!-- Filtros -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:flex;gap:16px;align-items:flex-end">
        <div class="form-group" style="margin:0;flex:1">
          <label>Fecha inicio</label>
          <input type="date" id="date-from" />
        </div>
        <div class="form-group" style="margin:0;flex:1">
          <label>Fecha fin</label>
          <input type="date" id="date-to" />
        </div>
        <button class="btn btn-primary" onclick="generateReport()">Generar reporte</button>
      </div>

      <!-- Resumen -->
      <div class="stats-grid" id="report-summary" style="display:none">
        <div class="stat-card">
          <div class="stat-label">Total vendido</div>
          <div class="stat-value success" id="r-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Transacciones</div>
          <div class="stat-value accent" id="r-count">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Promedio por venta</div>
          <div class="stat-value" id="r-avg">—</div>
        </div>
      </div>

      <!-- Top productos -->
      <div class="table-container" style="margin-bottom:24px">
        <div class="table-header"><h2>Top Productos Más Vendidos (últimos 30 días)</h2></div>
        <div id="top-products-table">
          <div class="loading-state"><div class="spinner"></div> Cargando...</div>
        </div>
      </div>

      <!-- Tabla de ventas del período -->
      <div class="table-container" id="sales-report-container" style="display:none">
        <div class="table-header"><h2>Ventas del Período</h2></div>
        <div id="sales-report-table"></div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    initUserUI();

    const fmt = v => new Intl.NumberFormat('es-CO', {
      style:'currency', currency:'COP', minimumFractionDigits:0
    }).format(v || 0);

    // Fechas por defecto: mes actual
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const today = now.toISOString().split('T')[0];
    document.getElementById('date-from').value = firstDay;
    document.getElementById('date-to').value   = today;

    async function loadTopProducts() {
      try {
        const data = await API.reports.topProducts(10) || [];
        const el = document.getElementById('top-products-table');
        if (!data.length) {
          el.innerHTML = `<div class="loading-state">Sin datos de ventas disponibles</div>`; return;
        }
        const maxQty = Math.max(...data.map(r => r.totalQty || 0));
        el.innerHTML = `
          <table>
            <thead><tr><th>Pos.</th><th>Producto</th><th>Unidades vendidas</th><th>Ingresos</th><th>Participación</th></tr></thead>
            <tbody>
              ${data.map((r, i) => `
                <tr>
                  <td class="mono" style="color:var(--accent);font-weight:700">#${i+1}</td>
                  <td><strong>${r.productName}</strong></td>
                  <td class="mono">${r.totalQty}</td>
                  <td class="mono">${fmt(r.totalRevenue)}</td>
                  <td style="min-width:160px">
                    <div class="forecast-bar-wrapper">
                      <div class="forecast-bar" style="width:${maxQty > 0 ? Math.round((r.totalQty/maxQty)*100) : 0}%"></div>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch(e) {
        showToast('Error cargando top productos: ' + e.message, 'error');
      }
    }

    async function generateReport() {
      const from = document.getElementById('date-from').value;
      const to   = document.getElementById('date-to').value;
      if (!from || !to) { showToast('Seleccione rango de fechas', 'warning'); return; }
      if (from > to) { showToast('La fecha de inicio no puede ser posterior al fin', 'warning'); return; }

      try {
        const report = await API.reports.sales(from, to);

        document.getElementById('report-summary').style.display = 'grid';
        document.getElementById('r-total').textContent = fmt(report.totalRevenue);
        document.getElementById('r-count').textContent = report.totalTransactions;
        document.getElementById('r-avg').textContent   = fmt(report.averagePerSale);

        const container = document.getElementById('sales-report-container');
        const el = document.getElementById('sales-report-table');
        container.style.display = '';

        if (!report.sales?.length) {
          el.innerHTML = `<div class="loading-state">Sin ventas en el período seleccionado</div>`; return;
        }

        el.innerHTML = `
          <table>
            <thead><tr><th>#</th><th>Vendedor</th><th>Items</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead>
            <tbody>
              ${report.sales.map(s => `
                <tr>
                  <td class="mono">#${s.id}</td>
                  <td>${s.user?.username || '—'}</td>
                  <td>${s.details?.length || 0}</td>
                  <td class="mono"><strong>${fmt(s.total)}</strong></td>
                  <td><span class="badge ${s.status === 'COMPLETED' ? 'badge-success' : 'badge-muted'}">${s.status}</span></td>
                  <td class="mono">${new Date(s.createdAt).toLocaleString('es-CO')}</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch(e) {
        showToast('Error generando reporte: ' + e.message, 'error');
      }
    }

    loadTopProducts();
  </script>
</body>
</html>
