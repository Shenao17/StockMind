<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockMind — Inventario</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>StockMind</h1><span>Gestión de Inventario</span></div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">◈</span> Productos</a>
        <a href="inventory.html" class="nav-item active"><span class="nav-icon">⊟</span> Inventario</a>
        <a href="sales.html" class="nav-item"><span class="nav-icon">◉</span> Ventas</a>
        <span class="nav-section-label">Analítica</span>
        <a href="predictions.html" class="nav-item"><span class="nav-icon">◈</span> Predicciones</a>
        <a href="reports.html" class="nav-item"><span class="nav-icon">⊡</span> Reportes</a>
        <span class="nav-section-label">Administración</span>
        <a href="users.html" class="nav-item" id="nav-users"><span class="nav-icon">◎</span> Usuarios</a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">—</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="logout()">⎋</button>
      </div>
    </aside>

    <header class="topbar">
      <span class="topbar-title">Control de Inventario</span>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-movement" onclick="openModal()">+ Registrar movimiento</button>
      </div>
    </header>

    <main class="main-content">
      <div class="table-container">
        <div class="table-header">
          <h2>Historial de Movimientos</h2>
        </div>
        <div id="movements-table">
          <div class="loading-state"><div class="spinner"></div> Cargando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal registrar movimiento -->
  <div class="modal-overlay" id="movement-modal">
    <div class="modal">
      <h3 class="modal-title">Registrar Movimiento de Inventario</h3>
      <div class="form-group">
        <label>Producto *</label>
        <select id="m-product"><option value="">Seleccionar producto...</option></select>
      </div>
      <div class="form-group">
        <label>Tipo de movimiento *</label>
        <select id="m-type">
          <option value="ENTRY">Entrada (compra / recepción)</option>
          <option value="EXIT">Salida (merma / pérdida)</option>
          <option value="ADJUSTMENT">Ajuste por conteo físico</option>
          <option value="RETURN">Devolución de cliente</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cantidad *</label>
        <input type="number" id="m-quantity" min="1" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Motivo / Observación</label>
        <input type="text" id="m-reason" placeholder="Opcional: describe el movimiento" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveMovement()">Registrar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    initUserUI();

    if (!Auth.isAdmin()) document.getElementById('btn-movement').style.display = 'none';

    const typeLabels = {
      ENTRY: { label: 'Entrada', cls: 'badge-success' },
      EXIT:  { label: 'Salida',  cls: 'badge-danger'  },
      SALE:  { label: 'Venta',   cls: 'badge-accent'  },
      ADJUSTMENT: { label: 'Ajuste', cls: 'badge-warning' },
      RETURN: { label: 'Devolución', cls: 'badge-muted' }
    };

    async function loadMovements() {
      try {
        const movements = await API.inventory.movements() || [];
        const el = document.getElementById('movements-table');
        if (!movements.length) {
          el.innerHTML = `<div class="loading-state">Sin movimientos registrados</div>`; return;
        }
        el.innerHTML = `
          <table>
            <thead><tr>
              <th>#</th><th>Producto</th><th>Tipo</th><th>Cantidad</th>
              <th>Stock antes</th><th>Stock después</th><th>Motivo</th><th>Usuario</th><th>Fecha</th>
            </tr></thead>
            <tbody>
              ${movements.map(m => {
                const type = typeLabels[m.type] || { label: m.type, cls: 'badge-muted' };
                return `<tr>
                  <td class="mono">${m.id}</td>
                  <td>${m.product?.name || '—'}</td>
                  <td><span class="badge ${type.cls}">${type.label}</span></td>
                  <td class="mono" style="color:${m.quantity > 0 ? 'var(--success)' : 'var(--danger)'}">
                    ${m.quantity > 0 ? '+' : ''}${m.quantity}</td>
                  <td class="mono">${m.stockBefore}</td>
                  <td class="mono">${m.stockAfter}</td>
                  <td style="font-size:.82rem;color:var(--text-dim)">${m.reason || '—'}</td>
                  <td class="mono">${m.user?.username || '—'}</td>
                  <td class="mono">${new Date(m.createdAt).toLocaleString('es-CO')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      } catch(e) {
        showToast('Error cargando movimientos: ' + e.message, 'error');
      }
    }

    async function openModal() {
      const products = await API.products.list() || [];
      const sel = document.getElementById('m-product');
      sel.innerHTML = '<option value="">Seleccionar...</option>' +
        products.map(p => `<option value="${p.id}">${p.name} (Stock: ${p.stockCurrent})</option>`).join('');
      document.getElementById('m-quantity').value = '';
      document.getElementById('m-reason').value = '';
      document.getElementById('movement-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('movement-modal').classList.remove('open');
    }

    async function saveMovement() {
      const productId = document.getElementById('m-product').value;
      const type      = document.getElementById('m-type').value;
      const quantity  = parseInt(document.getElementById('m-quantity').value);
      const reason    = document.getElementById('m-reason').value.trim();

      if (!productId || !quantity || quantity < 1) {
        showToast('Complete los campos obligatorios', 'warning'); return;
      }

      try {
        await API.inventory.register({ productId: parseInt(productId), type, quantity, reason });
        showToast('Movimiento registrado correctamente');
        closeModal();
        loadMovements();
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    document.getElementById('movement-modal').addEventListener('click', e => {
      if (e.target.id === 'movement-modal') closeModal();
    });

    loadMovements();
  </script>
</body>
</html>
